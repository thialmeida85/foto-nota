services:
  - type: web
    name: foto-notas-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: APP_AUTH_EMAIL
        value: jualmeidaatelie@gmail.com
      - key: APP_AUTH_PASSWORD
        sync: false
      - key: APP_AUTH_SECRET
        sync: false
      - key: NOTABE_URL
        value: https://asin.notabe.com/notes/new
      - key: NOTABE_USERNAME
        sync: false
      - key: NOTABE_PASSWORD
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct

  - type: web
    name: foto-notas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://foto-notas-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
